<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>围棋 · Claude vs OpenCLAW</title>
<style>
:root{--bg:#1a1a2e;--panel:#16213e;--text:#e0e0e0;--dim:#8892a4;--accent1:#ff6b6b;--accent2:#4ecdc4;--gold:#c9a96e;--radius:12px;--shadow:0 8px 32px rgba(0,0,0,0.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Segoe UI,PingFang SC,system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{display:flex;gap:28px;max-width:1100px;width:100%;align-items:flex-start}
.board-panel{background:var(--panel);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.board-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.player-tag{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;padding:8px 16px;border-radius:20px;transition:all .3s}
.player-tag.black{background:#1c1c1c;border:2px solid #555}
.player-tag.white{background:#2a2a2a;border:2px solid #888}
.player-tag.active{transform:scale(1.05);box-shadow:0 0 20px rgba(255,255,255,.15)}
.player-tag .stone{width:18px;height:18px;border-radius:50%}
.player-tag .stone.black-stone{background:radial-gradient(circle at 35% 35%,#555,#111)}
.player-tag .stone.white-stone{background:radial-gradient(circle at 35% 35%,#fff,#bbb)}
.player-tag .label{color:var(--dim);font-size:11px}
.player-tag.black .name{color:var(--accent1)}
.player-tag.white .name{color:var(--accent2)}
.player-tag .level{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,0.1);margin-top:2px;display:inline-block}
canvas#goban{display:block;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.5);cursor:default}
canvas#goban.human-turn{cursor:crosshair}
.info-panel{background:var(--panel);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);flex:1;min-width:300px;max-width:380px}
.info-panel h2{font-size:20px;margin-bottom:4px;color:var(--gold)}
.subtitle{font-size:13px;color:var(--dim);margin-bottom:12px}
.mode-row{display:flex;gap:8px;margin-bottom:8px}
.mode-btn{flex:1;padding:6px 12px;border:1px solid var(--dim);border-radius:6px;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:all .2s}
.mode-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.1)}
.badge-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:10px;padding:3px 10px;border-radius:10px;background:rgba(255,255,255,.08);color:var(--dim)}
.badge.on{background:rgba(76,175,80,.2);color:#4caf50}
.diff-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.diff-row label{font-size:11px;color:var(--dim);min-width:60px}
.diff-row select{flex:1;padding:4px 8px;border:1px solid rgba(255,255,255,.15);border-radius:4px;background:var(--panel);color:var(--text);font-size:12px}
.controls{margin-bottom:16px}
.btn{display:block;width:100%;padding:12px 20px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-start{background:linear-gradient(135deg,var(--accent1),#e55a5a);color:#fff}
.btn-start:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,107,.4)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-row{display:flex;gap:6px;margin-top:6px}
.btn-sm{flex:1;padding:8px 12px;border:1px solid var(--dim);border-radius:6px;background:transparent;color:var(--dim);font-size:12px;cursor:pointer}
.btn-sm:hover{border-color:var(--text);color:var(--text)}
.speed-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.speed-row label{font-size:11px;color:var(--dim)}
.speed-row input{flex:1;accent-color:var(--gold)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:rgba(255,255,255,.04);border-radius:8px;padding:10px;text-align:center}
.stat-card h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.stat-card .value{font-size:18px;font-weight:700}
.stat-card.bc .value{color:var(--accent1)}
.stat-card.wc .value{color:var(--accent2)}
.stat-card.mc .value{color:var(--gold)}
.progress-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.1);margin:6px 0 10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#111,#555);border-radius:3px;transition:width .4s}
.move-log{max-height:160px;overflow-y:auto;border-top:1px solid rgba(255,255,255,.08);padding-top:10px}
.move-log h3{font-size:13px;color:var(--dim);margin-bottom:6px}
.move-log .move{font-size:12px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:6px}
.move-log .move-num{color:var(--dim);min-width:26px}
.event-bar{margin-top:10px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;font-size:12px;color:var(--dim);min-height:38px;display:flex;align-items:center;gap:8px}
.event-bar .dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.2s infinite}
.event-bar .dot.thinking{background:var(--gold)}
.event-bar .dot.human-turn{background:var(--accent1);animation:none}
.event-bar .dot.done{background:#4caf50;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:860px){.container{flex-direction:column;align-items:center}.info-panel{max-width:100%;width:100%}}
</style>
</head>
<body>
<div class="container">
<div class="board-panel">
<div class="board-header">
<div class="player-tag black active" id="tag-black"><div class="stone black-stone"></div><div><div class="name">Claude<div class="level" id="level-black">Lv.5</div></div><div class="label">黑棋 · Black</div></div></div>
<div class="player-tag white" id="tag-white"><div class="stone white-stone"></div><div style="text-align:right"><div class="name">OpenCLAW<div class="level" id="level-white">Lv.5</div></div><div class="label">白棋 · White</div></div></div>
</div>
<canvas id="goban"></canvas>
</div>
<div class="info-panel">
<h2>围棋 Go</h2><p class="subtitle" id="game-title">AI 对弈模式</p>
<div class="mode-row">
<button class="mode-btn active" id="mode-ai" onclick="setMode('ai')">🤖 AI 对弈</button>
<button class="mode-btn" id="mode-human-b" onclick="setMode('human-b')">🧑 人执黑</button>
<button class="mode-btn" id="mode-human-w" onclick="setMode('human-w')">🧑 人执白</button>
</div>
<div class="diff-row"><label>Claude 难度</label><select id="diff-black" onchange="setDifficulty()"><option value="1">Lv.1 入门</option><option value="2">Lv.2 初级</option><option value="3">Lv.3 进阶</option><option value="4">Lv.4 中级</option><option value="5" selected>Lv.5 均衡</option><option value="6">Lv.6 熟练</option><option value="7">Lv.7 高级</option><option value="8">Lv.8 专家</option><option value="9">Lv.9 大师</option></select></div>
<div class="diff-row"><label>OpenCLAW 难度</label><select id="diff-white" onchange="setDifficulty()"><option value="1">Lv.1 入门</option><option value="2">Lv.2 初级</option><option value="3">Lv.3 进阶</option><option value="4">Lv.4 中级</option><option value="5" selected>Lv.5 均衡</option><option value="6">Lv.6 熟练</option><option value="7">Lv.7 高级</option><option value="8">Lv.8 专家</option><option value="9">Lv.9 大师</option></select></div>
<div class="controls"><button class="btn btn-start" id="btn-start" onclick="startGame()">▶ 开始对局</button><button class="btn btn-pause btn-sm" id="btn-pause" onclick="togglePause()" style="display:none">⏸ 暂停</button>
<div class="btn-row"><button class="btn-sm" onclick="exportGame()">📋 导出 SGF</button><button class="btn-sm" onclick="copySGFToClipboard()">📎 复制棋谱</button></div>
<div class="speed-row"><label>慢</label><input type="range" id="speed-slider" min="1" max="10" value="6" oninput="updateSpeed()"><label>快</label></div>
</div>
<div class="stats"><div class="stat-card bc"><h3>黑方提子</h3><div class="value" id="captures-black">0</div></div><div class="stat-card wc"><h3>白方提子</h3><div class="value" id="captures-white">0</div></div><div class="stat-card mc"><h3>手数</h3><div class="value" id="move-count">0</div></div></div>
<div class="progress-bar"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
<div class="move-log" id="move-log"><h3>棋谱</h3></div>
<div class="event-bar"><span class="dot done"></span><span id="event-text">准备就绪 · 选择模式后点击开始</span></div>
</div>
</div>
<script>
"use strict";
// ═══════════ Go Engine ═══════════
class GoGame{
  constructor(size=19){this.size=size;this.board=Array.from({length:size},()=>new Array(size).fill(0));this.moveHistory=[];this.captures=[0,0];this.koPoint=null;this.currentPlayer=1;this.gameOver=false;this.passes=0;this.boardHistory=new Set();this.handicap=0;this.handicapMoves=[];this.komi=6.5;this._recordHash()}
  clone(){const g=new GoGame(this.size);g.board=this.board.map(r=>[...r]);g.moveHistory=[...this.moveHistory];g.captures=[...this.captures];g.koPoint=this.koPoint?{...this.koPoint}:null;g.currentPlayer=this.currentPlayer;g.gameOver=this.gameOver;g.passes=this.passes;g.boardHistory=new Set(this.boardHistory);g.komi=this.komi;return g}
  inBounds(r,c){return r>=0&&r<this.size&&c>=0&&c<this.size}
  neighbors(r,c){return[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([nr,nc])=>this.inBounds(nr,nc))}
  getGroup(r,c){const color=this.board[r][c];if(color===0)return[];const group=[],visited=new Set(),stack=[[r,c]];while(stack.length>0){const[cr,cc]=stack.pop(),key=cr*this.size+cc;if(visited.has(key))continue;visited.add(key);group.push([cr,cc]);for(const[nr,nc]of this.neighbors(cr,cc))if(this.board[nr][nc]===color&&!visited.has(nr*this.size+nc))stack.push([nr,nc])}return group}
  countLiberties(group){const libs=new Set();for(const[r,c]of group)for(const[nr,nc]of this.neighbors(r,c))if(this.board[nr][nc]===0)libs.add(nr*this.size+nc);return libs.size}
  _hash(){let h='';for(let r=0;r<this.size;r++){for(let c=0;c<this.size;c++)h+=this.board[r][c];h+='|'}h+=this.captures[0]+','+this.captures[1]+','+this.currentPlayer;return h}
  _recordHash(){this.boardHistory.add(this._hash())}
  checkSuperko(r,c){const test=this.clone();test.board[r][c]=test.currentPlayer;const opp=test.currentPlayer===1?2:1;for(const[nr,nc]of test.neighbors(r,c))if(test.board[nr][nc]===opp){const grp=test.getGroup(nr,nc);if(test.countLiberties(grp)===0)for(const[gr,gc]of grp)test.board[gr][gc]=0}const own=test.getGroup(r,c);if(test.countLiberties(own)===0)return false;test.captures[test.currentPlayer-1]+=1;test.currentPlayer=test.currentPlayer===1?2:1;return!this.boardHistory.has(test._hash())}
  isLegalMove(r,c){if(!this.inBounds(r,c)||this.board[r][c]!==0)return false;if(this.koPoint&&this.koPoint.row===r&&this.koPoint.col===c)return false;if(!this.checkSuperko(r,c))return false;return true}
  play(r,c){if(!this.isLegalMove(r,c))return null;this._recordHash();const captured=[];this.board[r][c]=this.currentPlayer;this.koPoint=null;this.passes=0;const opp=this.currentPlayer===1?2:1;for(const[nr,nc]of this.neighbors(r,c))if(this.board[nr][nc]===opp){const grp=this.getGroup(nr,nc);if(this.countLiberties(grp)===0)for(const[gr,gc]of grp){this.board[gr][gc]=0;captured.push([gr,gc])}}this.captures[this.currentPlayer-1]+=captured.length;if(captured.length===1){const own=this.getGroup(r,c);if(own.length===1&&this.countLiberties(own)===1)this.koPoint=captured[0]}const move={row:r,col:c,player:this.currentPlayer,moveNum:this.moveHistory.length+1,captured:captured.length};this.moveHistory.push(move);this.currentPlayer=this.currentPlayer===1?2:1;return move}
  pass(){this._recordHash();this.koPoint=null;this.passes++;this.moveHistory.push({row:-1,col:-1,player:this.currentPlayer,moveNum:this.moveHistory.length+1,captured:0,pass:true});this.currentPlayer=this.currentPlayer===1?2:1;if(this.passes>=2)this.gameOver=true}
  getLegalMoves(){const m=[];for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++)if(this.isLegalMove(r,c))m.push({row:r,col:c});return m}
  estimateTerritory(){const vis=Array.from({length:this.size},()=>new Array(this.size).fill(false));let b=0,w=0;for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++){if(this.board[r][c]!==0||vis[r][c])continue;const reg=[],borders=new Set(),stack=[[r,c]];vis[r][c]=true;while(stack.length>0){const[cr,cc]=stack.pop();reg.push([cr,cc]);for(const[nr,nc]of this.neighbors(cr,cc)){if(this.board[nr][nc]===0&&!vis[nr][nc]){vis[nr][nc]=true;stack.push([nr,nc])}else if(this.board[nr][nc]!==0)borders.add(this.board[nr][nc])}}if(borders.size===1){const o=[...borders][0];if(o===1)b+=reg.length;else w+=reg.length}}return{black:b,white:w}}
}

// ═══════════ Go AI with Difficulty ═══════════
class GoAI{
  constructor(playerColor,difficulty=5){this.playerColor=playerColor;this.difficulty=difficulty}
  evaluateMove(game,r,c){const opp=this.playerColor===1?2:1;let score=0;const test=game.clone();test.board[r][c]=this.playerColor;let caps=0;for(const[nr,nc]of test.neighbors(r,c)){if(test.board[nr][nc]===opp){const g=test.getGroup(nr,nc);if(test.countLiberties(g)===0)caps+=g.length}}score+=caps*25;const own=test.getGroup(r,c);if(test.countLiberties(own)<=1)score-=40;let inf=0;for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){if(dr===0&&dc===0)continue;const d=Math.abs(dr)+Math.abs(dc),nr=r+dr,nc=c+dc;if(!game.inBounds(nr,nc))continue;if(game.board[nr][nc]===this.playerColor)inf+=(3-d)*4;else if(game.board[nr][nc]===opp)inf-=(3-d)*4}score+=inf;let ep=0;for(let dr=-3;dr<=3;dr++)for(let dc=-3;dc<=3;dc++){const d=Math.abs(dr)+Math.abs(dc);if(d===0||d>3)continue;const nr=r+dr,nc=c+dc;if(game.inBounds(nr,nc)&&game.board[nr][nc]===opp)ep+=(4-d)*3}score+=ep*(this.difficulty>=7?1.5:1);const ct=(game.size-1)/2,dc2=Math.abs(r-ct)+Math.abs(c-ct);score+=Math.max(0,10-dc2)*0.5;if(r===0||r===game.size-1||c===0||c===game.size-1)score-=3;let fp=0;for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const d=Math.abs(dr)+Math.abs(dc);if(d===0||d>2)continue;const nr=r+dr,nc=c+dc;if(game.inBounds(nr,nc)&&game.board[nr][nc]===this.playerColor)fp+=(3-d)*2}score+=fp*0.8;score+=Math.random()*(12-this.difficulty*1.2);return score}
  selectMove(game){const moves=game.getLegalMoves();if(moves.length===0)return null;if(game.moveHistory.length<6){const sp=[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]],es=sp.filter(([r,c])=>game.board[r][c]===0);if(es.length>0){const[r,c]=es[Math.floor(Math.random()*es.length)];return{row:r,col:c,score:100}}}
  if(this.difficulty<=2){const safe=moves.filter(m=>{const t=game.clone();t.board[m.row][m.col]=this.playerColor;const g=t.getGroup(m.row,m.col);return t.countLiberties(g)>2});const pool=safe.length>0?safe:moves;return pool[Math.floor(Math.random()*pool.length)]}
  if(this.difficulty<=4){const scored=moves.map(m=>({...m,score:this.evaluateMove(game,m.row,m.col)}));scored.sort((a,b)=>b.score-a.score);const top=Math.min(10,scored.length),pick=scored.slice(0,top);const total=pick.reduce((s,x)=>s+Math.exp(x.score*0.1),0);let r=Math.random()*total,sum=0;for(const p of pick){sum+=Math.exp(p.score*0.1);if(r<=sum)return p}return pick[pick.length-1]}
  if(this.difficulty<=6){const scored=moves.map(m=>({...m,score:this.evaluateMove(game,m.row,m.col)}));scored.sort((a,b)=>b.score-a.score);return scored[Math.floor(Math.random()*Math.min(3,Math.min(5,scored.length)))]}
  if(this.difficulty<=7)return this._minimax(game,moves,2);
  if(this.difficulty===8)return this._minimax(game,moves.slice(0,Math.min(50,moves.length)),2);
  return this._minimax(game,moves.slice(0,Math.min(60,moves.length)),3);
  }
  _minimax(game,candidates,depth){let bestMove=candidates[0],bestScore=-Infinity;for(const m of candidates){const sim=game.clone();sim.board[m.row][m.col]=sim.currentPlayer;const opp=sim.currentPlayer===1?2:1;for(const[nr,nc]of sim.neighbors(m.row,m.col))if(sim.board[nr][nc]===opp){const grp=sim.getGroup(nr,nc);if(sim.countLiberties(grp)===0)for(const[gr,gc]of grp)sim.board[gr][gc]=0}sim.currentPlayer=sim.currentPlayer===1?2:1;let score;if(depth>1){const om=sim.getLegalMoves();if(om.length>0&&om.length<80){const topOpp=om.slice(0,Math.min(25,om.length)).map(om2=>({...om2,score:this.evaluateMove(sim,om2.row,om2.col)}));topOpp.sort((a,b)=>b.score-a.score);score=-topOpp[0].score}else{score=this.evaluateMove(game,m.row,m.col)}}else{score=this.evaluateMove(game,m.row,m.col)}if(score>bestScore){bestScore=score;bestMove=m}}return bestMove}
}

// ═══════════ SGF Export (by OpenCLAW) ═══════════
const SGF_C='abcdefghjklmnopqrst';
function sgfCoord(r,c){return SGF_C[c]+SGF_C[r]}
function exportSGF(game,meta={}){const size=game.size,parts=[];parts.push('(;FF[4]');parts.push('GM[1]');parts.push('SZ['+size+']');parts.push('KM['+game.komi.toFixed(1)+']');if(game.handicap>0)parts.push('HA['+game.handicap+']');parts.push('PB['+(meta.blackName||'Claude')+']');parts.push('PW['+(meta.whiteName||'OpenCLAW')+']');if(meta.result)parts.push('RE['+meta.result+']');const d=new Date();parts.push('DT['+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+']');if(game.handicapMoves&&game.handicapMoves.length>0){parts.push('AB['+game.handicapMoves.map(m=>sgfCoord(m.row,m.col)).join('')+']')}for(const m of game.moveHistory){const p=m.player===1?'B':'W',c=m.pass?'':sgfCoord(m.row,m.col);parts.push(';'+p+'['+c+']')}parts.push(')');return parts.join('')}
function downloadSGF(game,meta){const sgf=exportSGF(game,meta),blob=new Blob([sgf],{type:'application/x-go-sgf'}),url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='game-'+new Date().toISOString().slice(0,10)+'.sgf';a.click();URL.revokeObjectURL(url)}
function copySGFToClipboard(){const sgf=exportSGF(game,{blackName:'Claude',whiteName:'OpenCLAW'});navigator.clipboard.writeText(sgf).then(()=>{const et=document.getElementById('event-text');et.textContent='SGF 已复制到剪贴板！';setTimeout(()=>updateUI(),1500)})}

// ═══════════ Board Renderer ═══════════
class BoardRenderer{
  constructor(canvasId,game){this.canvas=document.getElementById(canvasId);this.ctx=this.canvas.getContext('2d');this.game=game;this.padding=40;this.lastMove=null;this.hoverPos=null;this.resize()}
  resize(){const mx=Math.min(620,window.innerWidth-60);this.canvas.width=mx;this.canvas.height=mx;this.cellSize=(mx-this.padding*2)/(this.game.size-1);this.stoneRadius=this.cellSize*0.44;this.draw()}
  boardToPixel(r,c){return{x:this.padding+c*this.cellSize,y:this.padding+r*this.cellSize}}
  pixelToBoard(px,py){const c=Math.round((px-this.padding)/this.cellSize),r=Math.round((py-this.padding)/this.cellSize);if(r<0||r>=this.game.size||c<0||c>=this.game.size)return null;return{row:r,col:c}}
  draw(){const ctx=this.ctx,w=this.canvas.width,h=this.canvas.height,pad=this.padding,cs=this.cellSize,sz=this.game.size;const wg=ctx.createLinearGradient(0,0,w,h);wg.addColorStop(0,'#e8c776');wg.addColorStop(0.5,'#dcb35c');wg.addColorStop(1,'#c9a040');ctx.fillStyle=wg;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(139,100,50,0.08)';ctx.lineWidth=1;for(let i=0;i<h;i+=3){ctx.beginPath();ctx.moveTo(0,i+Math.sin(i*0.05)*2);ctx.lineTo(w,i+Math.sin(i*0.05+1)*2);ctx.stroke()}ctx.strokeStyle='#5a3e28';ctx.lineWidth=1;for(let i=0;i<sz;i++){const p=pad+i*cs;ctx.beginPath();ctx.moveTo(pad,p);ctx.lineTo(pad+(sz-1)*cs,p);ctx.stroke();ctx.beginPath();ctx.moveTo(p,pad);ctx.lineTo(p,pad+(sz-1)*cs);ctx.stroke()}ctx.fillStyle='#3a2210';for(const[r,c]of[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]]){const{x,y}=this.boardToPixel(r,c);ctx.beginPath();ctx.arc(x,y,cs*0.1,0,Math.PI*2);ctx.fill()}for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(this.game.board[r][c]!==0)continue;const bd=new Set();for(const[nr,nc]of this.game.neighbors(r,c))if(this.game.board[nr][nc]!==0)bd.add(this.game.board[nr][nc]);if(bd.size===1){const{x,y}=this.boardToPixel(r,c);ctx.fillStyle=[...bd][0]===1?'rgba(30,30,30,0.18)':'rgba(255,255,255,0.22)';ctx.fillRect(x-cs*0.4,y-cs*0.4,cs*0.8,cs*0.8)}}if(this.game.koPoint){const{x,y}=this.boardToPixel(this.game.koPoint.row,this.game.koPoint.col);ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(x,y,this.stoneRadius+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([])}for(let r=0;r<sz;r++)for(let c=0;c<sz;c++){if(this.game.board[r][c]===0)continue;const{x,y}=this.boardToPixel(r,c);this.drawStone(ctx,x,y,this.game.board[r][c])}const rc=Math.min(20,this.game.moveHistory.length);for(let i=this.game.moveHistory.length-rc;i<this.game.moveHistory.length;i++){const m=this.game.moveHistory[i];if(m.row<0)continue;const{x,y}=this.boardToPixel(m.row,m.col);ctx.fillStyle=m.player===1?'#fff':'#222';ctx.font=`bold ${cs*0.3}px "Segoe UI", sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(m.moveNum,x,y)}if(this.lastMove&&this.lastMove.row>=0){const{x,y}=this.boardToPixel(this.lastMove.row,this.lastMove.col);ctx.strokeStyle='#ff3333';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,y,this.stoneRadius+2,0,Math.PI*2);ctx.stroke()}if(this.hoverPos&&humanMode&&game.currentPlayer===humanColor&&game.isLegalMove(this.hoverPos.row,this.hoverPos.col)){const{x,y}=this.boardToPixel(this.hoverPos.row,this.hoverPos.col);ctx.fillStyle=humanColor===1?'rgba(50,50,50,0.5)':'rgba(220,220,220,0.5)';ctx.beginPath();ctx.arc(x,y,this.stoneRadius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([])}}
  drawStone(ctx,x,y,color){const r=this.stoneRadius;ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.arc(x+2,y+2,r,0,Math.PI*2);ctx.fill();if(color===1){const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);g.addColorStop(0,'#5a5a5a');g.addColorStop(0.6,'#2a2a2a');g.addColorStop(1,'#0a0a0a');ctx.fillStyle=g}else{const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);g.addColorStop(0,'#ffffff');g.addColorStop(0.6,'#e8e8e8');g.addColorStop(1,'#c0c0c0');ctx.fillStyle=g}ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=color===1?'rgba(80,80,80,0.5)':'rgba(180,180,180,0.5)';ctx.lineWidth=0.8;ctx.stroke()}
}

// ═══════════ Game Controller ═══════════
const game=new GoGame(19),renderer=new BoardRenderer('goban',game);
let aiBlack=new GoAI(1,5),aiWhite=new GoAI(2,5);
let running=false,paused=false,moveDelay=600,timerId=null;
let gameMode='ai',humanColor=null;

function setMode(mode){
  if(running)resetGame();
  gameMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');
  if(mode==='ai'){humanColor=null;document.getElementById('game-title').textContent='AI 对弈模式'}
  else if(mode==='human-b'){humanColor=1;document.getElementById('game-title').textContent='人机对弈 · 你执黑'}
  else{humanColor=2;document.getElementById('game-title').textContent='人机对弈 · 你执白'}
  updateHumanModeUI();
}
function setDifficulty(){
  aiBlack=new GoAI(1,parseInt(document.getElementById('diff-black').value));
  aiWhite=new GoAI(2,parseInt(document.getElementById('diff-white').value));
  document.getElementById('level-black').textContent='Lv.'+document.getElementById('diff-black').value;
  document.getElementById('level-white').textContent='Lv.'+document.getElementById('diff-white').value;
  if(running)resetGame();
}
function updateHumanModeUI(){
  const canvas=document.getElementById('goban');
  if(humanMode){canvas.classList.add('human-turn');renderer.hoverPos=null}else{canvas.classList.remove('human-turn');renderer.hoverPos=null}
  renderer.draw();
  updateUI();
}
function updateSpeed(){moveDelay=1100-parseInt(document.getElementById('speed-slider').value)*100}
function updateUI(){
  document.getElementById('tag-black').classList.toggle('active',game.currentPlayer===1&&!game.gameOver);
  document.getElementById('tag-white').classList.toggle('active',game.currentPlayer===2&&!game.gameOver);
  document.getElementById('captures-black').textContent=game.captures[0];
  document.getElementById('captures-white').textContent=game.captures[1];
  document.getElementById('move-count').textContent=game.moveHistory.length;
  document.getElementById('progress-bar').style.width=Math.min(100,game.moveHistory.length*0.4)+'%';
  const log=document.getElementById('move-log'),rec=game.moveHistory.slice(-10);
  let h='<h3>棋谱</h3>';
  for(const m of rec){const cls=m.player===1?'black-move':'white-move',coord=m.row>=0?String.fromCharCode(65+m.col)+(game.size-m.row):'Pass';h+='<div class="move '+cls+'"><span class="move-num">'+m.moveNum+'</span> '+coord+(m.captured>0?' +'+m.captured:'')+(m.pass?' Pass':'')+'</div>'}
  log.innerHTML=h;log.scrollTop=log.scrollHeight;
  const et=document.getElementById('event-text'),dot=document.querySelector('.event-bar .dot');
  if(game.gameOver){et.textContent='对局结束';dot.className='dot done'}
  else if(humanMode&&game.currentPlayer===humanColor&&!game.gameOver&&running){et.textContent='轮到你了 · 点击棋盘落子';dot.className='dot human-turn'}
  else if(running&&!paused){et.textContent=(game.currentPlayer===1?'Claude':'OpenCLAW')+' 思考中…';dot.className='dot thinking'}
}
Object.defineProperty(window,'humanMode',{get:function(){return gameMode!=='ai'}})

function makeMove(row,col){
  if(!game.isLegalMove(row,col))return false;
  const r=game.play(row,col);renderer.lastMove=r;renderer.draw();updateUI();
  if(game.gameOver){endGame();return true}
  return true
}
function makeAIMove(){
  if(!running||paused||game.gameOver)return;
  if(humanMode&&game.currentPlayer===humanColor)return;
  const ai=game.currentPlayer===1?aiBlack:aiWhite,move=ai.selectMove(game);
  if(move&&game.isLegalMove(move.row,move.col)){const r=game.play(move.row,move.col);renderer.lastMove=r}
  else{game.pass();renderer.lastMove=null}
  renderer.draw();updateUI();
  if(game.gameOver){endGame();return}
  if(humanMode&&game.currentPlayer===humanColor)return;
  scheduleNextMove();
}
function scheduleNextMove(){if(timerId)clearTimeout(timerId);timerId=setTimeout(()=>makeAIMove(),moveDelay)}
function startGame(){
  if(running)return;running=true;paused=false;
  document.getElementById('btn-start').textContent='对局中…';document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-pause').style.display='block';
  updateUI();renderer.draw();
  if(humanMode&&game.currentPlayer===humanColor){document.getElementById('event-text').textContent='轮到你了 · 点击棋盘落子';document.querySelector('.event-bar .dot').className='dot human-turn'}
  else{scheduleNextMove()}
}
function togglePause(){if(!running)return;paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶ 继续':'⏸ 暂停';if(!paused&&!(humanMode&&game.currentPlayer===humanColor))scheduleNextMove();updateUI()}
function endGame(){running=false;if(timerId)clearTimeout(timerId);const terr=game.estimateTerritory(),bs=terr.black+game.captures[0],ws=terr.white+game.captures[1]+game.komi,w=bs>ws?'Claude 胜！':ws>bs?'OpenCLAW 胜！':'平局！';document.getElementById('event-text').textContent='终局 · 黑: '+bs.toFixed(1)+' vs 白: '+ws.toFixed(1)+' · '+w;document.querySelector('.event-bar .dot').className='dot done';document.getElementById('btn-start').textContent='🔄 重新开始';document.getElementById('btn-start').disabled=false;document.getElementById('btn-start').onclick=resetGame;document.getElementById('btn-pause').style.display='none';updateUI()}
function resetGame(){
  const ng=new GoGame(19);Object.assign(game,ng);game.board=ng.board.map(r=>[...r]);game.moveHistory=[];game.captures=[0,0];game.koPoint=null;game.currentPlayer=1;game.gameOver=false;game.passes=0;game.boardHistory=new Set();game._recordHash();
  renderer.game=game;renderer.lastMove=null;renderer.hoverPos=null;renderer.draw();
  running=false;paused=false;if(timerId)clearTimeout(timerId);
  document.getElementById('btn-start').textContent='▶ 开始对局';document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-start').onclick=startGame;document.getElementById('btn-pause').style.display='none';
  document.getElementById('event-text').textContent='准备就绪 · 选择模式后点击开始';document.querySelector('.event-bar .dot').className='dot done';
  updateHumanModeUI();updateUI();
}
function exportGame(){downloadSGF(game,{blackName:'Claude Lv.'+aiBlack.difficulty,whiteName:'OpenCLAW Lv.'+aiWhite.difficulty})}

// Board click handler for human mode
renderer.canvas.addEventListener('click',e=>{
  if(!humanMode||!running||paused||game.gameOver)return;
  if(game.currentPlayer!==humanColor)return;
  const rect=renderer.canvas.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top;
  const pos=renderer.pixelToBoard(px,py);
  if(pos&&game.isLegalMove(pos.row,pos.col)){
    makeMove(pos.row,pos.col);
    if(!game.gameOver)scheduleNextMove();
  }
});
renderer.canvas.addEventListener('mousemove',e=>{
  if(!humanMode||!running||paused||game.gameOver||game.currentPlayer!==humanColor){if(renderer.hoverPos){renderer.hoverPos=null;renderer.draw()}return}
  const rect=renderer.canvas.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top;
  const pos=renderer.pixelToBoard(px,py);
  const prev=renderer.hoverPos;renderer.hoverPos=pos;
  if(!prev&&!pos)return;
  if(!prev||!pos||prev.row!==pos.row||prev.col!==pos.col)renderer.draw();
});
renderer.canvas.addEventListener('mouseleave',()=>{if(renderer.hoverPos){renderer.hoverPos=null;renderer.draw()}});

setDifficulty();renderer.draw();updateUI();
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();if(!running)startGame();else togglePause()}if(e.key==='r'||e.key==='R')resetGame()});
window.addEventListener('resize',()=>{renderer.resize();renderer.draw()});
</script>
